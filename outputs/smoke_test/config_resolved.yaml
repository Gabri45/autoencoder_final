project:
  output_dir: /media/gio/7b5fab34-c6ea-432d-a6c7-bae45e028c9d/SIMULATIONS/SIMULATIONS_GABRIELE/RMD_HN/autoencoder_final/outputs/smoke_test
  seed: 42
data:
  trajectory_glob: iter_*/ratchet_*/md_noPBC.xtc
  stride: 1
  recompute_features: false
  topology_glob: init_conf.gro
  data_dir: /media/gio/7b5fab34-c6ea-432d-a6c7-bae45e028c9d/SIMULATIONS/SIMULATIONS_GABRIELE/RMD_HN/rna/data
  conf_dir: /media/gio/7b5fab34-c6ea-432d-a6c7-bae45e028c9d/SIMULATIONS/SIMULATIONS_GABRIELE/RMD_HN/rna/conf
features:
  encoder: rna_g4_enriched
  params:
    hbond_cutoff: 0.35
  cache_prefix: features_mixed
training:
  mode: single
  n_ensemble: 5
  epochs: 2
  batch_size: 32
  lr: 0.001
  val_split: 0.3
  device: cpu
  early_stopping:
    patience: 20
  loss:
    beta_max: 0.25
    warmup_epochs: 0
    gamma: 1.0
    margin: 1.0
    free_bits: 0.5
  model:
    latent_dim: 2
    n_classes: 5
monitoring:
  log_every_epochs: 1
  plot_every_epochs: 10
  save_csv: true
  flush_stdout: true
evaluation:
  mode: auto
  plots:
    overview_4panel: true
    uncertainty: false
    hamming: true
    trajectory_grid_5x5: true
    landscape_grid_5x10: false
    confidence: true
    confidence_grid: true
    folded_only_4panel: false
    landscape_comparison: false
  by_target:
    enabled: false
  new_dataset:
    enabled: false
